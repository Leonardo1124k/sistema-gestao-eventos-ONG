<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciamento Talharim - Admin</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/admin-dashboard.css">
  <link rel="stylesheet" href="../css/admin-tables.css">
</head>
<body>
  <header class="admin-header">
    <div class="container">
      <div class="admin-header-content">
        <div class="logo">
          <div class="logo-icon">🔒</div>
          <span>ONG Eventos - Admin </span>
        </div>
        <div class="admin-user">
          <span id="nomeUsuario">Admin</span>
          <a href="../pages/talharim.html" class="btn btn-secondary btn-sm">Sair</a>
        </div>
      </div>
    </div>
  </header>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <nav class="admin-nav">
        <a href="admin-talharim.html" class="nav-item active">🍝 Talharim</a>
        <a href="admin-bazar.html" class="nav-item">🛍️ Bazar</a>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="container">
        <h1>Gerenciamento de Reservas - Talharim</h1>
        <p class="subtitle">Visualize e gerencie todas as reservas</p>

        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>Código</th>
                <th>Nome</th>
                <th>Quantidade</th>
                <th>Pagamento</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="reservasTable">
              <tr>
                <td colspan="6" class="empty-state">Nenhuma reserva registrada</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/admin-talharim.js"></script>
</body>
</html>
